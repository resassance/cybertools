<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Темная подложка, чтобы иконка не терялась в светлой теме браузера -->
    <rect width="100" height="100" rx="22" fill="#06070a"/>
    <!-- Внешний неоновый шестиугольник -->
    <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="#00f3ff" stroke-width="7" stroke-linejoin="round"/>
    <!-- Внутреннее ядро-чип (буквы C и H) -->
    <path d="M 38,38 L 38,62 M 38,50 L 62,50 M 62,38 L 62,62" fill="none" stroke="#ff0055" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
