<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cybertools — коллекция бесплатных, простых и быстрых онлайн-инструментов для работы, хобби и повседневных расчетов. Полностью без рекламы и регистрации.">
    <title>Cybertools // Бесплатные онлайн-калькуляторы и утилиты</title>
    <style>
        :root {
            --bg-base: #06070a;
            --bg-panel: #0d0e12;
            --border: #1e222d;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --shadow-cyan: rgba(0, 243, 255, 0.15);
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .hub-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: 0 0 12px var(--shadow-cyan);
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-secondary);
            font-family: monospace;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            text-align: left;
            transition: all 0.2s ease;
            display: block;
        }
        .card:hover {
            border-color: var(--neon-pink);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.1);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .card-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1>Cybertools // Hub</h1>
        <div class="subtitle">[ Экосистема веб-утилит и калькуляторов ]</div>
        
        <div class="grid">
            <!-- Твой первый инструмент -->
            <a href="3d-calculator/index.html" class="card">
                <div class="card-title">Cyberprint // Engine v1.2</div>
                <div class="card-desc">Точный и быстрый расчет себестоимости 3D-печати с учетом пластика, энергии и амортизации.</div>
            </a>
            
            <!-- Сюда в будущем просто скопируешь блок <a> для нового инструмента -->
        </div>
    </div>
</body>
</html>
